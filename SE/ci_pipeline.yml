# Lab: Continuous Integration Pipeline
# Course: Software Engineering (24PCA402)
#
# Task: This GitHub Actions workflow runs the test suite on every
# push and pull request targeting main. Extend it with a lint step
# and a coverage threshold check.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing

      # TODO (student task): add a lint step, e.g. flake8 or ruff
      # TODO (student task): fail the build if coverage < 80%
